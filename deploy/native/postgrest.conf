# PostgREST config for Quire (native self-host).
# Copy to /etc/postgrest/quire.conf, fill the two secrets, then: chmod 600 + chown to
# the postgrest service user. Values come from `node scripts/docker/gen-keys.mjs`.
#
# PostgREST connects as the `authenticator` login role (see docs/self-host-native.md),
# which can SET ROLE to `service_role` (from the JWT) or `anon` (no JWT).
db-uri       = "postgres://authenticator:REPLACE_WITH_PGPASSWORD@127.0.0.1:5432/quire"
db-schemas   = "public"
db-anon-role = "anon"
jwt-secret   = "REPLACE_WITH_PGRST_JWT_SECRET"
server-host  = "127.0.0.1"
server-port  = 3001
