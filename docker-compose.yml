# Fully self-contained Quire Blog — NO cloud. Postgres + PostgREST are the database,
# the local filesystem holds binaries, and a cron sidecar runs scheduled maintenance.
# Everything runs on your own host; only Google OAuth (sign-in) reaches the internet.
#
#   cp .env.docker.example .env.docker
#   node scripts/docker/gen-keys.mjs >> .env.docker   # DB password + JWT secret + key
#   # then fill AUTH_*, SITE_URL, AUTHORIZED_EMAIL in .env.docker
#   docker compose up -d --build
#
# No ${...} interpolation is used — every value is read straight from .env.docker by
# the containers — so plain `docker compose <cmd>` works with no --env-file flag.

services:
  # Postgres — the database (was Supabase). Schema + roles are applied once on first
  # init from docker/initdb + the app's own scripts/schema.sql (single source).
  db:
    image: postgres:16-alpine
    env_file: .env.docker            # POSTGRES_PASSWORD (from gen-keys.mjs)
    environment:
      POSTGRES_DB: quire
      POSTGRES_USER: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/initdb/01_roles.sql:/docker-entrypoint-initdb.d/01_roles.sql:ro
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
      - ./docker/initdb/03_grants.sql:/docker-entrypoint-initdb.d/03_grants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quire"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # PostgREST — the REST layer supabase-js talks to (was Supabase's API gateway).
  # Reads PGRST_JWT_SECRET + PGPASSWORD straight from .env.docker; connects as the
  # superuser (db port is NOT exposed to the host) and SET ROLEs to the role named in
  # each request's JWT (service_role) or `anon` when there is none.
  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.docker            # PGRST_JWT_SECRET + PGPASSWORD (from gen-keys.mjs)
    environment:
      PGRST_DB_URI: postgres://postgres@db:5432/quire   # password via PGPASSWORD
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
    restart: unless-stopped

  # One-shot: apply any pending SQL migrations (scripts/migrations/) before the app
  # starts. A fresh DB already has them seeded by schema.sql, so this is a no-op then;
  # on an upgrade it applies only the new files. psql ships in the postgres image.
  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.docker            # POSTGRES_PASSWORD (from gen-keys.mjs)
    environment:
      PGHOST: db
      PGUSER: postgres
      PGDATABASE: quire
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "-c", "PGPASSWORD=\"$$POSTGRES_PASSWORD\" sh /scripts/migrate.sh"]
    restart: "no"

  # One-shot: make the bind-mounted uploads dir writable by the app's `node` user
  # (uid 1000). Docker creates host bind-mounts as root, shadowing the image's
  # chown, so without this media uploads fail with EACCES. Runs as root, fixes
  # ownership, exits; the app waits for it to complete.
  init-uploads:
    image: alpine:3.20
    volumes:
      - ./data/uploads:/uploads
    entrypoint: ["/bin/sh", "-c", "chown -R 1000:1000 /uploads"]
    restart: "no"

  # The Next.js app. SUPABASE_URL points at the bundled PostgREST; POSTGREST_DIRECT
  # makes db.ts strip the `/rest/v1` path prefix so supabase-js works unchanged.
  app:
    build: .
    image: quire
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      init-uploads:
        condition: service_completed_successfully
    env_file: .env.docker
    environment:
      SUPABASE_URL: http://rest:3000
      POSTGREST_DIRECT: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./data/uploads:/app/uploads
    healthcheck:
      # /api/health checks Postgres reachable + store writable. Node has global fetch,
      # so no curl/wget needed in the slim runtime image.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Cron pings. A 5-min publish tick (`?publish=1`) flips due scheduled posts live on
  # time; every 12th tick (hourly) is the full maintenance run (variant/backup sweep +
  # keep-alive). Both send the CRON_SECRET bearer.
  cron:
    image: alpine:3.20
    depends_on:
      - app
    env_file: .env.docker
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl >/dev/null
        i=0
        while true; do
          sleep 300
          if [ $$((i % 12)) -eq 0 ]; then path=/api/cron; else path='/api/cron?publish=1'; fi
          curl -fsS -H "Authorization: Bearer $${CRON_SECRET}" "http://app:3000$${path}" >/dev/null \
            || echo "[cron] ping failed"
          i=$$((i + 1))
        done
